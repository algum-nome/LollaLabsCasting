<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lolla Labs Casting</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<!-- HOME -->
<section id="home" class="screen active">
  <div class="center">
    <h1>Lolla Labs</h1>
    <p>Faça seu digital casting aqui</p>
    <button id="startBtn">Enviar casting</button>
    <button id="adminBtn" class="secondary">Painel Admin</button>
  </div>
</section>

<!-- FORM -->
<section id="formScreen" class="screen">
  <div class="card">
    <h2>Cadastro</h2>
    <form id="form">
      <input id="nome" placeholder="Nome completo" required>
      <input id="idade" inputmode="numeric" placeholder="Idade" required>
      <input id="altura" placeholder="Altura (1.75)" required>
      <input id="email" placeholder="Email" required>
      <input id="telefone" inputmode="numeric"placeholder="Telefone" required>
      <input id="cidade" placeholder="Cidade" required>

      <input type="file" id="fotos" multiple accept="image/*">
      <div id="preview"></div>

      <button type="submit">Revisar</button>
    </form>
  </div>
</section>

<!-- PREVIEW -->
<section id="previewScreen" class="screen">
  <div class="card">
    <h2>Confirmar</h2>
    <div id="dados"></div>
    <div id="imagens"></div>

    <button id="confirmar">Confirmar envio</button>
    <button id="editar" class="secondary">Editar</button>

    <p id="status"></p>
  </div>
</section>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script src="app.js" defer></script>
</body>
</html>
